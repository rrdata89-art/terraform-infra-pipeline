name: "PROD DEPLOY"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      aws-assume-role-arn: "arn:aws:iam::778498600703:role/github-actions-rrdata89-art-pipeline"
      aws-region: "sa-east-1"
      aws-statefile-s3-bucket: "rrdata89-art-sa-east-1-terraform-statefile"
      aws-lock-dynamodb-table: "rrdata89-art-sa-east-1-terraform-lock"
